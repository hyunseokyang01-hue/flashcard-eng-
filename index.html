<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>English Flashcard</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --card: #222535; --border: #2e3248;
  --accent: #4f8ef7; --accent2: #7c5cfc; --green: #3ecf8e; --red: #f76f6f;
  --yellow: #f7c948; --text: #e8eaf0; --muted: #8892aa; --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo { font-size: 17px; font-weight: 700; }
.logo span { color: var(--accent); }
.word-count { font-size: 12px; color: var(--muted); background: var(--card); padding: 3px 8px; border-radius: 20px; }
.tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 8px 14px; font-size: 13px; font-weight: 500; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.content { padding: 16px; max-width: 600px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }
.search-box { position: relative; margin-bottom: 14px; }
.search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 36px 10px 12px; color: var(--text); font-size: 14px; outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-box .clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); cursor: pointer; font-size: 16px; background: none; border: none; }
.filter-chips { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; scrollbar-width: none; padding-bottom: 2px; }
.filter-chips::-webkit-scrollbar { display: none; }
.chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); white-space: nowrap; }
.chip.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.1); }
.word-list { display: flex; flex-direction: column; gap: 8px; }
.word-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.word-info { flex: 1; min-width: 0; }
.word-en { font-size: 15px; font-weight: 600; }
.word-pos { font-size: 11px; color: var(--accent2); font-weight: 500; }
.word-ko { font-size: 13px; color: var(--muted); margin-top: 3px; }
.word-actions { display: flex; gap: 6px; }
.btn-icon { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }
.pagination { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 16px; padding: 8px 0; }
.btn-page { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }
.btn-page:disabled { opacity: 0.4; cursor: default; }
.page-info { font-size: 13px; color: var(--muted); }
.section-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.quiz-controls { display: flex; gap: 10px; margin-bottom: 10px; }
.quiz-mode-btn { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; }
.quiz-mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.08); }
.form-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 10px; }
.form-input:focus { border-color: var(--accent); }
.form-row { display: flex; gap: 8px; }
.form-row .form-input { flex: 1; margin-bottom: 0; }
.btn { padding: 11px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
.btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 10px; }
.btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: var(--red); color: #fff; }
.btn-full { width: 100%; }
.btn-ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; width: 100%; margin-bottom: 10px; }
.quiz-header { text-align: center; margin-bottom: 20px; }
.quiz-progress { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.quiz-score-display { font-size: 13px; color: var(--green); font-weight: 600; }
.progress-bar { background: var(--surface); border-radius: 4px; height: 4px; margin-bottom: 20px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent2)); height: 100%; border-radius: 4px; transition: width 0.3s; }
.quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 20px; text-align: center; margin-bottom: 18px; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.quiz-question { font-size: 24px; font-weight: 700; line-height: 1.3; }
.quiz-sub { font-size: 13px; color: var(--muted); }
.quiz-pos { font-size: 12px; color: var(--accent2); font-weight: 600; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.opt-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; text-align: left; font-size: 14px; color: var(--text); cursor: pointer; line-height: 1.4; width: 100%; }
.opt-btn.correct { border-color: var(--green); background: rgba(62,207,142,0.1); color: var(--green); }
.opt-btn.wrong-ans { border-color: var(--red); background: rgba(247,111,111,0.1); color: var(--red); }
.result-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 20px; text-align: center; margin-bottom: 16px; }
.result-emoji { font-size: 48px; margin-bottom: 12px; }
.result-score { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--muted); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card { background: var(--card); border-radius: 10px; padding: 12px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.ai-result { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.ai-result-en { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.ai-result-ko { font-size: 14px; color: var(--muted); line-height: 1.5; }
.api-status { font-size: 12px; padding: 4px 8px; border-radius: 6px; font-weight: 500; }
.api-status.ok { background: rgba(62,207,142,0.15); color: var(--green); }
.api-status.none { background: rgba(247,111,111,0.15); color: var(--red); }
.wrong-card { background: var(--surface); border: 1px solid rgba(247,111,111,0.3); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
.wrong-count { font-size: 11px; color: var(--red); font-weight: 600; margin-bottom: 4px; }
.info-text { font-size: 12px; color: var(--muted); line-height: 1.6; padding: 10px 12px; background: var(--card); border-radius: 8px; }
.loading { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.section-divider { height: 1px; background: var(--border); margin: 16px 0; }
/* SR & Article Tag styles */
.sr-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px; margin-left: 6px; }
.sr-due { background: rgba(247,201,72,0.2); color: var(--yellow); border: 1px solid rgba(247,201,72,0.4); }
.sr-new { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
.sr-ok { background: rgba(62,207,142,0.15); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
.article-tag { display: inline-block; font-size: 10px; color: var(--accent2); background: rgba(124,92,252,0.12); border: 1px solid rgba(124,92,252,0.25); border-radius: 6px; padding: 1px 6px; margin-top: 3px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sr-due-count { display: inline-block; background: var(--yellow); color: #1a1d27; font-size: 11px; font-weight: 700; border-radius: 10px; padding: 2px 7px; margin-left: 6px; }
.article-filter-row { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 10px; scrollbar-width: none; padding-bottom: 2px; }
.article-filter-row::-webkit-scrollbar { display: none; }
.article-chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.article-chip.active { border-color: var(--accent2); color: var(--accent2); background: rgba(124,92,252,0.1); }
.sr-info-box { background: var(--card); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.sr-info-label { font-size: 13px; color: var(--muted); }
.sr-info-num { font-size: 20px; font-weight: 700; color: var(--yellow); }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">EN <span>Flash</span>card</div>
    <div class="word-count" id="wordCount">0개</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showPage('list')">단어장</button>
    <button class="tab" onclick="showPage('quiz')">퀴즈</button>
    <button class="tab" onclick="showPage('add')">단어추가</button>
    <button class="tab" onclick="showPage('wrong')">오답노트</button>
    <button class="tab" onclick="showPage('export')">관리</button>
  </div>
</div>

<div class="content">
  <!-- 단어장 -->
  <div id="page-list" class="page active">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="영어 또는 한국어 검색..." oninput="filterWords()">
      <button class="clear" onclick="clearSearch()">x</button>
    </div>
    <div class="filter-chips" id="filterChips">
      <div class="chip active" onclick="setFilter('all',this)">전체</div>
      <div class="chip" onclick="setFilter('[형]',this)">[형]</div>
      <div class="chip" onclick="setFilter('[명]',this)">[명]</div>
      <div class="chip" onclick="setFilter('[동]',this)">[동]</div>
      <div class="chip" onclick="setFilter('[구동사]',this)">[구동사]</div>
      <div class="chip" onclick="setFilter('[부사]',this)">[부사]</div>
      <div class="chip" onclick="setFilter('[구]',this)">[구]</div>
    </div>
    <div class="article-filter-row" id="articleFilterRow"></div>
    <div id="wordList" class="word-list"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- 퀴즈 -->
  <div id="page-quiz" class="page">
    <div id="quizSetup">
      <div class="section-box">
        <div class="section-title">퀴즈 설정</div>
        <div class="quiz-controls">
          <button class="quiz-mode-btn active" id="modeBtn1" onclick="setQuizMode('en-ko')">영 to 한</button>
          <button class="quiz-mode-btn" id="modeBtn2" onclick="setQuizMode('ko-en')">한 to 영</button>
        </div>
        <div class="sr-info-box" id="srInfoBox">
          <div>
            <div class="sr-info-label">🔁 오늘 복습 예정</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Spaced Repetition 기반</div>
          </div>
          <div class="sr-info-num" id="srDueCount">0</div>
        </div>
        <div class="quiz-controls" style="margin-bottom:14px">
          <button class="quiz-mode-btn" id="modeBtnSR" onclick="setQuizType('sr')" style="border-color:var(--yellow);color:var(--yellow)">🔁 SR 복습</button>
          <button class="quiz-mode-btn active" id="modeBtnAll" onclick="setQuizType('all')">전체</button>
        </div>
        <label class="form-label">문제 수</label>
        <select id="quizCount" class="form-input">
          <option value="5">5문제</option>
          <option value="10" selected>10문제</option>
          <option value="20">20문제</option>
          <option value="30">30문제</option>
        </select>
        <button class="btn btn-primary" onclick="startQuiz()">퀴즈 시작</button>
      </div>
      <div class="section-box">
        <div class="section-title">퀴즈 통계</div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">총 풀이 수</div></div>
          <div class="stat-card"><div class="stat-num" id="statRate" style="color:var(--green)">0%</div><div class="stat-label">정답률</div></div>
        </div>
      </div>
    </div>
    <div id="quizActive" style="display:none">
      <div class="quiz-header">
        <div class="quiz-progress" id="quizProgress">1 / 10</div>
        <div class="quiz-score-display" id="quizScoreDisplay">정답: 0</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="quiz-card">
        <div class="quiz-pos" id="quizPos"></div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-sub" id="quizSub"></div>
      </div>
      <div class="quiz-options" id="quizOptions"></div>
      <button class="btn btn-secondary btn-full" onclick="stopQuiz()">퀴즈 종료</button>
    </div>
    <div id="quizResult" style="display:none">
      <div class="result-box">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <div class="result-score" id="resultScore">0/10</div>
        <div class="result-sub" id="resultSub"></div>
      </div>
      <div id="wrongList" style="margin-bottom:16px"></div>
      <button class="btn btn-primary btn-full" onclick="restartQuiz()">다시 풀기</button>
      <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="stopQuiz()">설정으로</button>
    </div>
  </div>

  <!-- 단어추가 -->
  <div id="page-add" class="page">
    <div class="section-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600;color:var(--muted)">Anthropic API 키</span>
        <span class="api-status none" id="apiStatus">미설정</span>
      </div>
      <input type="password" id="apiKeyInput" class="form-input" placeholder="sk-ant-...">
      <button class="btn btn-secondary btn-full" onclick="saveApiKey()">저장</button>
      <div class="info-text" style="margin-top:8px">API 키는 이 기기의 localStorage에만 저장됩니다.</div>
    </div>
    <div class="section-box">
      <label class="form-label">AI 검색 (영단어 입력)</label>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="text" id="aiSearchInput" class="form-input" placeholder="검색할 단어..." style="margin:0;flex:1" onkeydown="if(event.key==='Enter')aiSearch()">
        <button class="btn btn-secondary" onclick="aiSearch()" id="aiSearchBtn">검색</button>
      </div>
      <div id="aiResultBox" style="display:none">
        <div class="ai-result" id="aiResultContent"></div>
        <button class="btn btn-ai" onclick="addFromAI()">+ 단어장에 추가</button>
      </div>
    </div>
    <div class="section-box" style="margin-top:-6px">
      <label class="form-label">📰 기사 태그 (선택)</label>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <input type="text" id="articleTagInput" class="form-input" placeholder="예: WSJ 2026-04-05 · Tariffs" style="margin:0;flex:1">
        <button class="btn btn-secondary" onclick="saveArticleTag()" style="white-space:nowrap">저장</button>
      </div>
      <div id="currentArticleDisplay" style="font-size:12px;color:var(--muted)">현재 태그 없음 — 단어 추가 시 이 태그가 자동 적용됩니다</div>
    </div>
    <div class="section-divider"></div>
    <div class="section-box">
      <label class="form-label">직접 입력</label>
      <input type="text" id="manualEn" class="form-input" placeholder="English word">
      <div class="form-row">
        <input type="text" id="manualPos" class="form-input" placeholder="품사 (예: [명])">
        <input type="text" id="manualKo" class="form-input" placeholder="한국어 뜻">
      </div>
      <button class="btn btn-primary" onclick="addManual()">추가</button>
    </div>
  </div>

  <!-- 오답노트 -->
  <div id="page-wrong" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:15px;font-weight:600">오답노트 <span id="wrongTotal" style="color:var(--muted);font-size:13px"></span></div>
      <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="clearWrong()">초기화</button>
    </div>
    <div id="wrongNoteList"></div>
  </div>

  <!-- 관리 -->
  <div id="page-export" class="page">
    <div class="section-box">
      <div class="section-title">통계</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="statWords">0</div><div class="stat-label">총 단어</div></div>
        <div class="stat-card"><div class="stat-num" id="statCustom" style="color:var(--green)">0</div><div class="stat-label">추가한 단어</div></div>
        <div class="stat-card"><div class="stat-num" id="statWrong" style="color:var(--red)">0</div><div class="stat-label">오답 단어</div></div>
        <div class="stat-card"><div class="stat-num" id="statQuizDone">0</div><div class="stat-label">퀴즈 완료</div></div>
      </div>
    </div>
    <div class="section-box">
      <div class="section-title">내보내기 / 가져오기</div>
      <button class="btn btn-primary btn-full" onclick="exportData()" style="margin-bottom:8px">JSON 내보내기</button>
      <button class="btn btn-secondary btn-full" onclick="document.getElementById('importFile').click()">JSON 가져오기</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="section-box">
      <div class="section-title">초기화</div>
      <button class="btn btn-danger btn-full" onclick="resetCustom()">추가한 단어만 삭제</button>
    </div>
  </div>
</div>

<script>

  try { var s = localStorage.getItem('fc_sr'); if(s) srData = JSON.parse(s); } catch(e){}
  try { var s = localStorage.getItem('fc_article_tag'); if(s) { currentArticleTag = s; updateArticleTagDisplay(); } } catch(e){}
  var key = localStorage.getItem('fc_apikey');
  if(key) {
    document.getElementById('apiKeyInput').value = key;
    document.getElementById('apiStatus').textContent = '설정됨';
    document.getElementById('apiStatus').className = 'api-status ok';
  }
}

function saveData() {
  localStorage.setItem('fc_custom', JSON.stringify(customWords));
  localStorage.setItem('fc_wrong', JSON.stringify(wrongAnswers));
  localStorage.setItem('fc_stats', JSON.stringify(quizStats));
  localStorage.setItem('fc_sr', JSON.stringify(srData));
}

function allWords() { return BUILTIN.concat(customWords); }

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  var tabs = document.querySelectorAll('.tab');
  var map = {list:0, quiz:1, add:2, wrong:3, export:4};
  tabs[map[name]].classList.add('active');
  if(name==='list') { renderArticleFilters(); renderList(); }
  if(name==='wrong') renderWrong();
  if(name==='export') renderStats();
  if(name==='quiz') { renderQuizStats(); renderSRDueCount(); }
}

function getFiltered() {
  var words = allWords();
  if(currentFilter !== 'all') {
    words = words.filter(function(w){ return w.pos && w.pos.indexOf(currentFilter) >= 0; });
  }
  if(currentArticleFilter !== 'all') {
    words = words.filter(function(w){ return w.articleTag === currentArticleFilter; });
  }
  if(currentSearch) {
    var q = currentSearch.toLowerCase();
    words = words.filter(function(w){ return w.en.toLowerCase().indexOf(q) >= 0 || w.ko.indexOf(currentSearch) >= 0; });
  }
  return words;
}

function renderList() {
  var words = getFiltered();
  var total = words.length;
  var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if(currentPage > totalPages) currentPage = 1;
  var start = (currentPage-1) * PAGE_SIZE;
  var slice = words.slice(start, start + PAGE_SIZE);

  document.getElementById('wordCount').textContent = allWords().length + '개';

  var list = document.getElementById('wordList');
  if(slice.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>검색 결과 없음</div>';
  } else {
    var html = '';
    for(var i=0; i<slice.length; i++) {
      var w = slice[i];
      var isWrong = wrongAnswers[w.id];
      var enSafe = w.en.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var srBadge = getSRBadge(w.id);
      html += '<div class="word-card">';
      html += '<div class="word-info">';
      html += '<div class="word-en">' + escHtml(w.en) + ' <span class="word-pos">' + escHtml(w.pos||'') + '</span>' + srBadge + '</div>';
      html += '<div class="word-ko">' + escHtml(w.ko) + '</div>';
      if(w.articleTag) html += '<div class="article-tag">📰 ' + escHtml(w.articleTag) + '</div>';
      html += '</div>';
      html += '<div class="word-actions">';
      html += '<button class="btn-icon" onclick="tts(\'' + enSafe + '\')">🔊</button>';
      if(isWrong) html += '<button class="btn-icon" style="color:var(--red)" onclick="removeWrong(\'' + w.id + '\')">❌</button>';
      html += '</div></div>';
    }
    list.innerHTML = html;
  }

  var pag = document.getElementById('pagination');
  if(totalPages <= 1) { pag.innerHTML = ''; return; }
  pag.innerHTML = '<button class="btn-page" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>◀</button>' +
    '<span class="page-info">' + currentPage + ' / ' + totalPages + '</span>' +
    '<button class="btn-page" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?'disabled':'') + '>▶</button>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function goPage(p) { currentPage = p; renderList(); window.scrollTo(0,0); }
function filterWords() { currentSearch = document.getElementById('searchInput').value; currentPage = 1; renderList(); }
function clearSearch() { document.getElementById('searchInput').value = ''; currentSearch = ''; currentPage = 1; renderList(); }
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  currentPage = 1;
  renderList();
}

function setArticleFilter(tag, el) {
  currentArticleFilter = tag;
  document.querySelectorAll('.article-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  currentPage = 1;
  renderList();
}

function renderArticleFilters() {
  var words = allWords();
  var tags = {};
  words.forEach(function(w){ if(w.articleTag) tags[w.articleTag] = (tags[w.articleTag]||0)+1; });
  var tagList = Object.keys(tags);
  var el = document.getElementById('articleFilterRow');
  if(tagList.length === 0) { el.innerHTML = ''; return; }
  var html = '<div class="article-chip active" onclick="setArticleFilter(\'all\',this)">전체 기사</div>';
  tagList.forEach(function(tag){
    html += '<div class="article-chip" onclick="setArticleFilter(\'' + escHtml(tag) + '\',this)">📰 ' + escHtml(tag) + ' <span style="opacity:0.6">(' + tags[tag] + ')</span></div>';
  });
  el.innerHTML = html;
}

function tts(text) {
  if(!window.speechSynthesis) return;
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function removeWrong(id) { delete wrongAnswers[id]; saveData(); renderList(); }

function setQuizMode(mode) {
  quizMode = mode;
  document.getElementById('modeBtn1').className = 'quiz-mode-btn' + (mode==='en-ko'?' active':'');
  document.getElementById('modeBtn2').className = 'quiz-mode-btn' + (mode==='ko-en'?' active':'');
}

function setQuizType(type) {
  quizType = type;
  var srBtn = document.getElementById('modeBtnSR');
  var allBtn = document.getElementById('modeBtnAll');
  if(type === 'sr') {
    srBtn.className = 'quiz-mode-btn active'; srBtn.style.borderColor=''; srBtn.style.color='';
    allBtn.className = 'quiz-mode-btn'; allBtn.style.borderColor=''; allBtn.style.color='';
  } else {
    allBtn.className = 'quiz-mode-btn active';
    srBtn.className = 'quiz-mode-btn'; srBtn.style.borderColor='var(--yellow)'; srBtn.style.color='var(--yellow)';
  }
}

// ── Spaced Repetition (SM-2) ─────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }

function getSREntry(id) {
  if(!srData[id]) srData[id] = {interval:1, ef:2.5, nextReview:todayStr(), reps:0};
  return srData[id];
}

function getSRDueWords() {
  var today = todayStr();
  return allWords().filter(function(w){
    var e = srData[w.id];
    if(!e) return true; // never reviewed = due
    return e.nextReview <= today;
  });
}

function updateSR(wordId, correct) {
  var e = getSREntry(wordId);
  if(correct) {
    e.reps++;
    if(e.reps === 1) e.interval = 1;
    else if(e.reps === 2) e.interval = 6;
    else e.interval = Math.round(e.interval * e.ef);
    e.ef = Math.max(1.3, e.ef + 0.1 - (1-1)*(0.08 + (1-1)*0.02));
  } else {
    e.reps = 0;
    e.interval = 1;
    e.ef = Math.max(1.3, e.ef - 0.2);
  }
  var next = new Date();
  next.setDate(next.getDate() + e.interval);
  e.nextReview = next.toISOString().slice(0,10);
  srData[wordId] = e;
  saveData();
}

function getSRBadge(id) {
  var e = srData[id];
  var today = todayStr();
  if(!e || e.nextReview <= today) return '<span class="sr-badge sr-due">복습</span>';
  var days = Math.round((new Date(e.nextReview) - new Date(today)) / 86400000);
  if(days <= 3) return '<span class="sr-badge sr-new">D+' + days + '</span>';
  return '<span class="sr-badge sr-ok">D+' + days + '</span>';
}

function renderSRDueCount() {
  var cnt = getSRDueWords().length;
  document.getElementById('srDueCount').textContent = cnt;
}

// ── Article Tagging ───────────────────────────────────────────────
function saveArticleTag() {
  var tag = document.getElementById('articleTagInput').value.trim();
  currentArticleTag = tag;
  localStorage.setItem('fc_article_tag', tag);
  updateArticleTagDisplay();
  showToast(tag ? '기사 태그 저장: ' + tag : '태그 초기화됨', 'success');
}

function updateArticleTagDisplay() {
  var el = document.getElementById('currentArticleDisplay');
  if(!el) return;
  if(currentArticleTag) {
    el.innerHTML = '적용 중: <span class="article-tag">📰 ' + escHtml(currentArticleTag) + '</span>';
    el.style.color = 'var(--accent2)';
  } else {
    el.textContent = '현재 태그 없음 — 단어 추가 시 이 태그가 자동 적용됩니다';
    el.style.color = '';
  }
  var inp = document.getElementById('articleTagInput');
  if(inp) inp.value = currentArticleTag;
}

function startQuiz() {
  var count = parseInt(document.getElementById('quizCount').value);
  var pool;
  if(quizType === 'sr') {
    pool = getSRDueWords();
    if(pool.length < 4) { showToast('오늘 복습할 단어가 4개 미만입니다', 'error'); return; }
  } else {
    pool = allWords();
    if(pool.length < 4) { showToast('단어가 4개 이상 필요합니다', 'error'); return; }
  }
  quizWords = shuffle(pool).slice(0, Math.min(count, pool.length));
  quizIndex = 0; quizCorrect = 0; quizSessionWrong = [];
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizActive').style.display = 'block';
  document.getElementById('quizResult').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  var w = quizWords[quizIndex];
  var total = quizWords.length;
  document.getElementById('quizProgress').textContent = (quizIndex+1) + ' / ' + total;
  document.getElementById('quizScoreDisplay').textContent = '정답: ' + quizCorrect;
  document.getElementById('progressFill').style.width = ((quizIndex/total)*100) + '%';
  document.getElementById('quizPos').textContent = w.pos || '';
  if(quizMode === 'en-ko') {
    document.getElementById('quizQuestion').textContent = w.en;
    document.getElementById('quizSub').textContent = '한국어 뜻은?';
  } else {
    document.getElementById('quizQuestion').textContent = w.ko;
    document.getElementById('quizSub').textContent = '영어 단어는?';
  }
  var others = allWords().filter(function(x){ return x.id !== w.id; });
  var wrong3 = shuffle(others).slice(0,3);
  var opts = shuffle([w].concat(wrong3));
  var html = '';
  for(var i=0; i<opts.length; i++) {
    var o = opts[i];
    var label = quizMode === 'en-ko' ? o.ko : o.en;
    html += '<button class="opt-btn" data-id="' + o.id + '" onclick="selectAnswer(\'' + o.id + '\',\'' + w.id + '\')">' + escHtml(label) + '</button>';
  }
  document.getElementById('quizOptions').innerHTML = html;
}

function selectAnswer(selectedId, correctId) {
  var btns = document.querySelectorAll('.opt-btn');
  btns.forEach(function(b){ b.disabled = true; });
  var words = allWords();
  var correctWord = null;
  for(var i=0; i<words.length; i++) { if(words[i].id === correctId) { correctWord = words[i]; break; } }

  btns.forEach(function(b){
    if(b.dataset.id === correctId) b.classList.add('correct');
    if(b.dataset.id === selectedId && selectedId !== correctId) b.classList.add('wrong-ans');
  });

  if(selectedId !== correctId) {
    wrongAnswers[correctId] = (wrongAnswers[correctId]||0) + 1;
    quizSessionWrong.push(correctWord);
    updateSR(correctId, false);
  } else {
    quizCorrect++;
    updateSR(correctId, true);
  }

  setTimeout(function(){
    quizIndex++;
    if(quizIndex >= quizWords.length) endQuiz();
    else renderQuizQuestion();
  }, 900);
}

function endQuiz() {
  quizStats.total += quizWords.length;
  quizStats.correct += quizCorrect;
  quizStats.sessions++;
  saveData();
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').style.display = 'block';
  var rate = Math.round((quizCorrect / quizWords.length) * 100);
  document.getElementById('resultScore').textContent = quizCorrect + '/' + quizWords.length;
  document.getElementById('resultSub').textContent = '정답률 ' + rate + '%';
  var emoji = rate>=90?'🎉':rate>=70?'👍':rate>=50?'💪':'😅';
  document.getElementById('resultEmoji').textContent = emoji;
  var wl = document.getElementById('wrongList');
  if(quizSessionWrong.length === 0) {
    wl.innerHTML = '<div style="text-align:center;color:var(--green);padding:10px">전부 맞혔습니다! 🎊</div>';
  } else {
    var html = '<div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">틀린 단어 (' + quizSessionWrong.length + '개)</div>';
    for(var i=0; i<quizSessionWrong.length; i++) {
      var w = quizSessionWrong[i];
      html += '<div class="wrong-card"><div class="word-en">' + escHtml(w.en) + '</div><div class="word-ko" style="color:var(--muted);font-size:13px">' + escHtml(w.ko) + '</div></div>';
    }
    wl.innerHTML = html;
  }
  renderQuizStats();
}

function stopQuiz() {
  document.getElementById('quizSetup').style.display = 'block';
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').style.display = 'none';
}

function restartQuiz() { stopQuiz(); startQuiz(); }

function renderQuizStats() {
  document.getElementById('statTotal').textContent = quizStats.total;
  var rate = quizStats.total > 0 ? Math.round((quizStats.correct/quizStats.total)*100) : 0;
  document.getElementById('statRate').textContent = rate + '%';
}

function saveApiKey() {
  var key = document.getElementById('apiKeyInput').value.trim();
  if(!key) { showToast('API 키를 입력하세요', 'error'); return; }
  localStorage.setItem('fc_apikey', key);
  document.getElementById('apiStatus').textContent = '설정됨';
  document.getElementById('apiStatus').className = 'api-status ok';
  showToast('API 키 저장 완료', 'success');
}

async function aiSearch() {
  var word = document.getElementById('aiSearchInput').value.trim();
  if(!word) return;
  var apiKey = localStorage.getItem('fc_apikey');
  if(!apiKey) { showToast('API 키를 먼저 설정하세요', 'error'); return; }
  var btn = document.getElementById('aiSearchBtn');
  btn.innerHTML = '<span class="loading"></span>';
  btn.disabled = true;
  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: '영어 단어 "' + word + '"의 정보를 JSON으로만 답하세요 (설명 없이):\n{"en":"' + word + '","pos":"[품사]","ko":"뜻 (간결하게, 뉘앙스 포함)"}'
        }]
      })
    });
    var data = await resp.json();
    if(!resp.ok) throw new Error(data.error ? data.error.message : 'API 오류');
    var text = data.content[0].text.replace(/```json|```/g,'').trim();
    aiResultData = JSON.parse(text);
    aiResultData.id = 'c' + Date.now();
    document.getElementById('aiResultContent').innerHTML =
      '<div class="ai-result-en">' + escHtml(aiResultData.en) + ' <span style="font-size:13px;color:var(--accent2)">' + escHtml(aiResultData.pos) + '</span></div>' +
      '<div class="ai-result-ko">' + escHtml(aiResultData.ko) + '</div>';
    document.getElementById('aiResultBox').style.display = 'block';
  } catch(e) {
    showToast('검색 실패: ' + e.message, 'error');
  } finally {
    btn.innerHTML = '검색';
    btn.disabled = false;
  }
}

function addFromAI() {
  if(!aiResultData) return;
  if(currentArticleTag) aiResultData.articleTag = currentArticleTag;
  addWord(aiResultData);
  document.getElementById('aiSearchInput').value = '';
  document.getElementById('aiResultBox').style.display = 'none';
  aiResultData = null;
}

function addManual() {
  var en = document.getElementById('manualEn').value.trim();
  var pos = document.getElementById('manualPos').value.trim();
  var ko = document.getElementById('manualKo').value.trim();
  if(!en || !ko) { showToast('단어와 뜻을 입력하세요', 'error'); return; }
  var w = {id:'c'+Date.now(), en:en, pos:pos, ko:ko};
  if(currentArticleTag) w.articleTag = currentArticleTag;
  addWord(w);
  document.getElementById('manualEn').value = '';
  document.getElementById('manualPos').value = '';
  document.getElementById('manualKo').value = '';
}

function addWord(w) {
  var all = allWords();
  for(var i=0; i<all.length; i++) {
    if(all[i].en.toLowerCase() === w.en.toLowerCase()) { showToast('이미 있는 단어입니다', 'error'); return; }
  }
  customWords.push(w);
  saveData();
  document.getElementById('wordCount').textContent = allWords().length + '개';
  showToast('추가 완료: ' + w.en, 'success');
}

function renderWrong() {
  var words = allWords();
  var entries = [];
  var keys = Object.keys(wrongAnswers);
  for(var i=0; i<keys.length; i++) {
    var id = keys[i];
    var word = null;
    for(var j=0; j<words.length; j++) { if(words[j].id === id) { word = words[j]; break; } }
    if(word) entries.push({word:word, cnt:wrongAnswers[id]});
  }
  entries.sort(function(a,b){ return b.cnt - a.cnt; });
  document.getElementById('wrongTotal').textContent = '(' + entries.length + '개)';
  var el = document.getElementById('wrongNoteList');
  if(entries.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✅</div>오답 단어 없음</div>';
    return;
  }
  var html = '';
  for(var i=0; i<entries.length; i++) {
    var e = entries[i];
    var enSafe = e.word.en.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<div class="wrong-card">';
    html += '<div class="wrong-count">❌ ' + e.cnt + '회 틀림</div>';
    html += '<div style="display:flex;justify-content:space-between;align-items:center">';
    html += '<div><div class="word-en">' + escHtml(e.word.en) + ' <span style="font-size:12px;color:var(--accent2)">' + escHtml(e.word.pos||'') + '</span></div>';
    html += '<div class="word-ko" style="color:var(--muted);font-size:13px">' + escHtml(e.word.ko) + '</div></div>';
    html += '<div style="display:flex;gap:6px">';
    html += '<button class="btn-icon" onclick="tts(\'' + enSafe + '\')">🔊</button>';
    html += '<button class="btn-icon" onclick="removeWrong(\'' + e.word.id + '\')">🗑️</button>';
    html += '</div></div></div>';
  }
  el.innerHTML = html;
}

function clearWrong() {
  if(!confirm('오답노트를 전부 초기화할까요?')) return;
  wrongAnswers = {}; saveData(); renderWrong();
}

function renderStats() {
  var all = allWords();
  document.getElementById('statWords').textContent = all.length;
  document.getElementById('statCustom').textContent = customWords.length;
  document.getElementById('statWrong').textContent = Object.keys(wrongAnswers).length;
  document.getElementById('statQuizDone').textContent = quizStats.sessions;
}

function exportData() {
  var data = {custom:customWords, qs:{n:quizStats.total,c:quizStats.correct}, wrong:wrongAnswers, sr:srData, exportedAt:new Date().toISOString()};
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'en_flashcard_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('내보내기 완료', 'success');
}

function importData(e) {
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      var added = 0;
      var existing = allWords().map(function(w){ return w.en.toLowerCase(); });
      if(data.custom) {
        data.custom.forEach(function(w){
          if(existing.indexOf(w.en.toLowerCase()) < 0) { customWords.push(w); added++; }
        });
      }
      if(data.wrong) Object.assign(wrongAnswers, data.wrong);
      if(data.sr) Object.assign(srData, data.sr);
      saveData(); renderStats();
      document.getElementById('wordCount').textContent = allWords().length + '개';
      showToast(added + '개 단어 가져오기 완료', 'success');
    } catch(err) { showToast('파일 형식 오류', 'error'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetCustom() {
  if(!confirm('추가한 단어(' + customWords.length + '개)를 삭제할까요?')) return;
  customWords = []; saveData(); renderStats();
  document.getElementById('wordCount').textContent = allWords().length + '개';
  showToast('초기화 완료', 'success');
}

function shuffle(arr) {
  var a = arr.slice();
  for(var i=a.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.className = 'toast'; }, 2500);
}

loadData();
renderArticleFilters();
renderList();
renderSRDueCount();
